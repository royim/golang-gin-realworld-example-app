version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    # 기존 유지
    - staticcheck
    - unused
    - misspell

    # 기본 검사
    - govet
    - errcheck
    - ineffassign

    # 코드 품질 (gosimple은 v2에서 staticcheck에 통합)
    - gocritic
    - unconvert

  settings:
    misspell:
      locale: US

    errcheck:
      exclude-functions:
        - fmt.Println
        - fmt.Printf
        - (io.Closer).Close

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - typeAssertChain
        - ifElseChain

    staticcheck:
      checks:
        - all
        # 프로젝트 기존 스타일 허용
        - "-ST1000"   # 패키지 주석 없음
        - "-ST1003"   # snake_case 변수명 (test_db, my_user_id 등 기존 패턴)
        - "-ST1005"   # 대문자 시작 에러 문자열 (기존 패턴)
        - "-ST1006"   # self 리시버명 (기존 패턴)
        - "-ST1016"   # 혼합 리시버명 (기존 패턴)
        - "-ST1020"   # exported function 주석 없음
        - "-ST1021"   # exported type 주석 없음
        - "-ST1022"   # 주석 형식
        - "-QF1008"   # 임베디드 필드 셀렉터 단순화

  exclusions:
    presets:
      - std-error-handling
    rules:
      # 테스트 파일에서는 오류 체크/gocritic 완화
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
    max-issues-per-linter: 50
    max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/gothinkster/golang-gin-realworld-example-app
